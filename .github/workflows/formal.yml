# Coq/Rocq + Agda — matches root `make coq-check` / `make agda-check` / `make formal-check`.
name: Formal (Coq + Agda)
on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "Coq/**"
      - "Agda/**"
      - "Makefile"
      - "scripts/formal_check.sh"
      - ".github/workflows/formal.yml"
  pull_request:
    paths:
      - "Coq/**"
      - "Agda/**"
      - "Makefile"
      - "scripts/formal_check.sh"
      - ".github/workflows/formal.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coq:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rocq-community/docker-coq-action@v1
        with:
          custom_image: rocq/rocq-prover:9.0
          custom_script: |
            set -e
            cd Coq
            for f in LandauerEinsteinBridge.v DensityStateSpec.v ComplementaritySpec.v VonNeumannEntropySpec.v MeasurementCost.v InfoTheory.v Gate.v Extraction.v Constitutional.v; do
              echo "==> Compiling $f"
              coqc -Q . UMSTFormal "$f"
            done

  agda:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Agda + stdlib
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y agda agda-stdlib
      - name: agda-check (all Agda/ modules)
        run: |
          set -e
          cd Agda
          # Find the stdlib include path (dpkg tells us where the files are)
          STDLIB_INC=$(dpkg -L agda-stdlib | grep '/Data$' | head -1 | sed 's|/Data$||')
          if [ -z "$STDLIB_INC" ]; then
            # Fallback: try common paths
            for p in /usr/share/agda-stdlib /usr/share/agda/lib/agda-stdlib; do
              if [ -d "$p/Data" ]; then
                STDLIB_INC="$p"
                break
              fi
            done
          fi
          echo "Agda stdlib include path: $STDLIB_INC"
          if [ -z "$STDLIB_INC" ]; then
            echo "ERROR: Could not find Agda stdlib include path"
            dpkg -L agda-stdlib | head -40
            exit 1
          fi
          for f in DensityStateSpec.agda ComplementaritySpec.agda VonNeumannEntropySpec.agda LandauerEinsteinTrace.agda Gate.agda Helmholtz.agda DIB-Kleisli.agda Naturality.agda Activation.agda InfoTheory.agda MeasurementCost.agda; do
            echo "==> Checking $f"
            agda -v0 -i . -i "$STDLIB_INC" "$f"
          done
