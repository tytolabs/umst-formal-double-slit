# Coq/Rocq + Agda — matches root `make coq-check` / `make agda-check` / `make formal-check`.
name: Formal (Coq + Agda)
on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "Coq/**"
      - "Agda/**"
      - "Makefile"
      - "scripts/formal_check.sh"
      - ".github/workflows/formal.yml"
  pull_request:
    paths:
      - "Coq/**"
      - "Agda/**"
      - "Makefile"
      - "scripts/formal_check.sh"
      - ".github/workflows/formal.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coq:
    # The project uses `From Stdlib` (Rocq 9.x syntax) — Ubuntu's Coq 8.18
    # does not support this, so we must use the official Rocq container.
    # The container's coqc lives under opam, so we must source the opam env
    # (running as default 'coq' user, NOT root, to preserve opam setup).
    runs-on: ubuntu-latest
    container:
      image: rocq/rocq-prover:9.0
    steps:
      - name: Install git (needed for checkout)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq git
      - uses: actions/checkout@v4
      - name: coq-check (all Coq/ modules)
        run: |
          set -e
          cd Coq
          for f in LandauerEinsteinBridge.v DensityStateSpec.v ComplementaritySpec.v VonNeumannEntropySpec.v MeasurementCost.v InfoTheory.v Gate.v Extraction.v Constitutional.v; do
            echo "==> Compiling $f"
            coqc -Q . UMSTFormal "$f"
          done

  agda:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Agda + stdlib
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y agda agda-stdlib
          agda --version
          # Check if the library is auto-registered
          echo "=== Checking /etc/agda ==="
          ls -la /etc/agda/ 2>/dev/null || echo "no /etc/agda"
          cat /etc/agda/libraries 2>/dev/null || echo "no /etc/agda/libraries"
          cat /etc/agda/defaults 2>/dev/null || echo "no /etc/agda/defaults"
      - name: agda-check (all Agda/ modules)
        run: |
          set -e
          cd Agda
          for f in DensityStateSpec.agda ComplementaritySpec.agda VonNeumannEntropySpec.agda LandauerEinsteinTrace.agda Gate.agda Helmholtz.agda DIB-Kleisli.agda Naturality.agda Activation.agda InfoTheory.agda MeasurementCost.agda; do
            echo "==> Checking $f"
            agda -v0 "$f"
          done
