# Coq/Rocq + Agda formal verification CI.
#
# Coq: the `rocq/rocq-prover:9.0` image's ENTRYPOINT is `opam exec --`,
#       which fails under `--user root`. We clear the entrypoint and
#       dynamically find the opam bin directory to get `rocq compile`.
# Agda: the Ubuntu `agda-stdlib` package installs source at /usr/share/agda-stdlib/
#       but does not register it with Agda. We create ~/.agda/libraries + defaults
#       and chmod the stdlib dir so Agda can write .agdai interface caches.
name: Formal (Coq + Agda)
on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "Coq/**"
      - "Agda/**"
      - "Makefile"
      - "scripts/formal_check.sh"
      - ".github/workflows/formal.yml"
  pull_request:
    paths:
      - "Coq/**"
      - "Agda/**"
      - "Makefile"
      - "scripts/formal_check.sh"
      - ".github/workflows/formal.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coq:
    runs-on: ubuntu-latest
    container:
      image: rocq/rocq-prover:9.0
      options: --user root --entrypoint ""
    steps:
      - name: Install git
        run: |
          apt-get update -qq
          apt-get install -y -qq git
      - uses: actions/checkout@v4
      - name: coq-check (all Coq/ modules)
        run: |
          set -e
          # Find the rocq binary — could be under /home/coq or /home/rocq
          ROCQ_BIN=""
          for d in /home/coq/.opam/*/bin /home/rocq/.opam/*/bin; do
            if [ -x "$d/rocq" ]; then
              ROCQ_BIN="$d"
              break
            fi
          done
          if [ -z "$ROCQ_BIN" ]; then
            echo "Searching entire filesystem for rocq..."
            ROCQ_PATH="$(find / -name rocq -type f 2>/dev/null | head -1)"
            if [ -n "$ROCQ_PATH" ]; then
              ROCQ_BIN="$(dirname "$ROCQ_PATH")"
            else
              echo "ERROR: rocq binary not found anywhere"
              ls -la /home/ 2>/dev/null || true
              exit 1
            fi
          fi
          export PATH="${ROCQ_BIN}:${PATH}"
          echo "Using rocq from: $ROCQ_BIN"
          rocq compile --version
          cd Coq
          for f in LandauerEinsteinBridge.v DensityStateSpec.v ComplementaritySpec.v VonNeumannEntropySpec.v MeasurementCost.v InfoTheory.v Gate.v Extraction.v Constitutional.v; do
            echo "==> Compiling $f"
            rocq compile -Q . UMSTFormal "$f"
          done

  agda:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Agda + stdlib
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y agda agda-stdlib
          agda --version
      - name: Register stdlib and fix permissions
        run: |
          set -e
          STDLIB_DIR="/usr/share/agda-stdlib"
          # Create .agda-lib manifest if missing
          if [ ! -f "$STDLIB_DIR/standard-library.agda-lib" ]; then
            printf "name: standard-library\ninclude: .\n" | sudo tee "$STDLIB_DIR/standard-library.agda-lib"
          fi
          # Register with Agda
          mkdir -p ~/.agda
          echo "$STDLIB_DIR/standard-library.agda-lib" > ~/.agda/libraries
          echo "standard-library" > ~/.agda/defaults
          # Make stdlib writable for .agdai interface cache
          sudo chmod -R a+w "$STDLIB_DIR"
      - name: agda-check (all Agda/ modules)
        run: |
          set -e
          cd Agda
          for f in DensityStateSpec.agda ComplementaritySpec.agda VonNeumannEntropySpec.agda LandauerEinsteinTrace.agda Gate.agda Helmholtz.agda DIB-Kleisli.agda Naturality.agda Activation.agda InfoTheory.agda MeasurementCost.agda; do
            echo "==> Checking $f"
            agda "$f"
          done
