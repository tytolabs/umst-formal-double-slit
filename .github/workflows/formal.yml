# Coq/Rocq + Agda — matches root `make coq-check` / `make agda-check` / `make formal-check`.
name: Formal (Coq + Agda)
on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "Coq/**"
      - "Agda/**"
      - "Makefile"
      - "scripts/formal_check.sh"
      - ".github/workflows/formal.yml"
  pull_request:
    paths:
      - "Coq/**"
      - "Agda/**"
      - "Makefile"
      - "scripts/formal_check.sh"
      - ".github/workflows/formal.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coq:
    runs-on: ubuntu-latest
    container:
      image: rocq/rocq-prover:9.0
      options: --user root
    steps:
      - name: Install build tools
        run: |
          apt-get update -qq
          apt-get install -y -qq make git
      - uses: actions/checkout@v4
      - name: coq-check (all Coq/ modules)
        run: make coq-check

  agda:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Agda + stdlib
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y agda agda-stdlib
      - name: Configure Agda stdlib
        run: |
          set -e
          # Find the actual .agda-lib file for stdlib
          STDLIB_LIB=$(find /usr/share -name "standard-library.agda-lib" 2>/dev/null | head -1)
          if [ -z "$STDLIB_LIB" ]; then
            echo "ERROR: Could not find standard-library.agda-lib"
            find /usr/share -name "*.agda-lib" 2>/dev/null
            exit 1
          fi
          STDLIB_DIR=$(dirname "$STDLIB_LIB")
          echo "Found stdlib at: $STDLIB_DIR"
          mkdir -p ~/.agda
          echo "$STDLIB_DIR" > ~/.agda/libraries
          echo "standard-library" > ~/.agda/defaults
      - name: agda-check (all Agda/ modules)
        run: make agda-check
