# Coq/Rocq + Agda — matches root `make coq-check` / `make agda-check` / `make formal-check`.
name: Formal (Coq + Agda)
on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "Coq/**"
      - "Agda/**"
      - "Makefile"
      - "scripts/formal_check.sh"
      - ".github/workflows/formal.yml"
  pull_request:
    paths:
      - "Coq/**"
      - "Agda/**"
      - "Makefile"
      - "scripts/formal_check.sh"
      - ".github/workflows/formal.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coq:
    runs-on: ubuntu-latest
    container:
      image: rocq/rocq-prover:9.0
      options: --user root
    steps:
      - name: Install git
        run: |
          apt-get update -qq
          apt-get install -y -qq git
      - uses: actions/checkout@v4
      - name: coq-check (all Coq/ modules)
        shell: bash
        run: |
          set -e
          # Source opam env — coqc lives in the opam switch
          eval $(opam env --switch=/home/coq/.opam/default --set-switch 2>/dev/null || true)
          eval $(opam env 2>/dev/null || true)
          if ! command -v coqc &>/dev/null; then
            COQC=$(find / -name coqc -type f 2>/dev/null | head -1)
            if [ -n "$COQC" ]; then
              export PATH="$(dirname $COQC):$PATH"
            else
              echo "ERROR: coqc not found"
              exit 1
            fi
          fi
          echo "coqc version: $(coqc --version)"
          cd Coq
          for f in LandauerEinsteinBridge.v DensityStateSpec.v ComplementaritySpec.v VonNeumannEntropySpec.v MeasurementCost.v InfoTheory.v Gate.v Extraction.v Constitutional.v; do
            echo "==> Compiling $f"
            coqc -Q . UMSTFormal "$f" 2>&1
          done

  agda:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Agda + stdlib
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y agda agda-stdlib
          echo "Agda: $(agda --version)"
          echo "Stdlib: $(dpkg -s agda-stdlib | grep Version)"
      - name: agda-check (all Agda/ modules)
        run: |
          set -e
          cd Agda
          for f in DensityStateSpec.agda ComplementaritySpec.agda VonNeumannEntropySpec.agda LandauerEinsteinTrace.agda Gate.agda Helmholtz.agda DIB-Kleisli.agda Naturality.agda Activation.agda InfoTheory.agda MeasurementCost.agda; do
            echo "==> Checking $f"
            agda "$f" 2>&1
          done
