# Coq/Rocq + Agda — matches root `make coq-check` / `make agda-check` / `make formal-check`.
name: Formal (Coq + Agda)
on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "Coq/**"
      - "Agda/**"
      - "Makefile"
      - "scripts/formal_check.sh"
      - ".github/workflows/formal.yml"
  pull_request:
    paths:
      - "Coq/**"
      - "Agda/**"
      - "Makefile"
      - "scripts/formal_check.sh"
      - ".github/workflows/formal.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coq:
    # Code uses `From Stdlib` (Rocq 9.x); Ubuntu's Coq 8.18 cannot compile it.
    # In Rocq 9.0 the compiler is `rocq compile`, NOT `coqc`.
    runs-on: ubuntu-latest
    container:
      image: rocq/rocq-prover:9.0
      options: --user root
    steps:
      - name: Install git
        run: |
          apt-get update -qq
          apt-get install -y -qq git
      - uses: actions/checkout@v4
      - name: coq-check (all Coq/ modules)
        run: |
          set -e
          rocq compile --version
          cd Coq
          for f in LandauerEinsteinBridge.v DensityStateSpec.v ComplementaritySpec.v VonNeumannEntropySpec.v MeasurementCost.v InfoTheory.v Gate.v Extraction.v Constitutional.v; do
            echo "==> Compiling $f"
            rocq compile -Q . UMSTFormal "$f"
          done

  agda:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Agda + stdlib
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y agda agda-stdlib
          agda --version
      - name: Register stdlib with Agda
        run: |
          set -e
          # The agda-stdlib deb installs source at /usr/share/agda-stdlib/
          # but does NOT create /etc/agda/libraries or ~/.agda/libraries.
          # We must register it manually.
          # First, find or create the .agda-lib file
          STDLIB_DIR="/usr/share/agda-stdlib"
          if [ ! -d "$STDLIB_DIR/Data" ]; then
            echo "ERROR: stdlib not at expected path"
            exit 1
          fi
          # Create an agda-lib file if one doesn't exist
          if [ ! -f "$STDLIB_DIR/standard-library.agda-lib" ]; then
            echo "name: standard-library" | sudo tee "$STDLIB_DIR/standard-library.agda-lib"
            echo "include: ." | sudo tee -a "$STDLIB_DIR/standard-library.agda-lib"
          fi
          # Register with Agda
          mkdir -p ~/.agda
          echo "$STDLIB_DIR/standard-library.agda-lib" > ~/.agda/libraries
          echo "standard-library" > ~/.agda/defaults
          echo "Registered stdlib at: $STDLIB_DIR"
          cat ~/.agda/libraries
      - name: agda-check (all Agda/ modules)
        run: |
          set -e
          cd Agda
          for f in DensityStateSpec.agda ComplementaritySpec.agda VonNeumannEntropySpec.agda LandauerEinsteinTrace.agda Gate.agda Helmholtz.agda DIB-Kleisli.agda Naturality.agda Activation.agda InfoTheory.agda MeasurementCost.agda; do
            echo "==> Checking $f"
            agda "$f"
          done
